version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: skoolly-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skoolly
      MYSQL_USER: skoolly
      MYSQL_PASSWORD: skoolly
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: skoolly
    container_name: skoolly-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skoolly
      SPRING_DATASOURCE_USERNAME: skoolly
      SPRING_DATASOURCE_PASSWORD: skoolly
    depends_on:
      mysql:
        condition: service_healthy