spring:
  application:
    name: skooLLy

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  flyway:
    enabled: false

  server:
    port: 8080

application:
    security:
      jwt:
        secret-key: ${SECRET_KEY}
        expiration: 86400000

app:
  upload:
    dir: uploads
    base-url: http://localhost:8080